<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume — AI Recruiter Assistant</title>
    <meta name="description" content="Upload your resume PDF to power your AI assistant. Recruiters can then ask questions about your experience, skills and projects.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="upload.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="app-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="page-container">

        <!-- Header Nav -->
        <nav class="top-nav">
            <div class="nav-brand">
                <div class="brand-icon">AI</div>
                <span>Recruiter Assistant</span>
            </div>
            <a href="index.html" class="nav-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Back to Chat
            </a>
        </nav>

        <!-- Upload Card -->
        <div class="upload-card">
            <div class="card-header">
                <div class="doc-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                </div>
                <div>
                    <h1>Upload Resume</h1>
                    <p class="card-subtitle">Let the AI learn your story from your PDF</p>
                </div>
            </div>

            <!-- Drop Zone -->
            <div class="drop-zone" id="drop-zone">
                <div class="drop-zone-inner">
                    <div class="drop-icon" id="drop-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
                    </div>
                    <p class="drop-title" id="drop-title">Drop your PDF here</p>
                    <p class="drop-sub" id="drop-sub">or <span class="browse-link" id="browse-link">browse to choose</span></p>
                    <p class="drop-hint">PDF only · Max 5MB</p>
                    <input type="file" id="file-input" accept=".pdf" hidden>
                </div>
            </div>

            <!-- File Preview (hidden until selected) -->
            <div class="file-preview" id="file-preview" hidden>
                <div class="file-info">
                    <div class="file-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    </div>
                    <div>
                        <p class="file-name" id="file-name">resume.pdf</p>
                        <p class="file-size" id="file-size">0 KB</p>
                    </div>
                </div>
                <button class="remove-btn" id="remove-file" aria-label="Remove file">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <!-- Options -->
            <div class="options-row">
                <label class="toggle-label" for="replace-toggle">
                    <div class="toggle-text">
                        <span>Replace existing resume</span>
                        <span class="toggle-hint">Clears old data before uploading</span>
                    </div>
                    <div class="toggle-wrap">
                        <input type="checkbox" id="replace-toggle" checked>
                        <span class="toggle-track"></span>
                    </div>
                </label>
            </div>

            <!-- Upload Button -->
            <button class="upload-btn" id="upload-btn" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
                Upload & Process Resume
            </button>

            <!-- Progress -->
            <div class="progress-wrap" id="progress-wrap" hidden>
                <div class="progress-bar-track">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
                <p class="progress-label" id="progress-label">Uploading...</p>
            </div>
        </div>

        <!-- Result Card (hidden until complete) -->
        <div class="result-card" id="result-card" hidden>
            <div class="result-header" id="result-status-icon">
                <!-- injected by JS -->
            </div>
            <div class="result-body" id="result-body">
                <!-- injected by JS -->
            </div>
            <div class="result-actions">
                <button class="action-btn secondary" id="upload-another-btn">Upload Another</button>
                <a href="index.html" class="action-btn primary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                    Go to Chat
                </a>
            </div>
        </div>

    </main>

    <script src="upload.js"></script>
</body>
</html>
