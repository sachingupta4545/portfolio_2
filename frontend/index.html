<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Assistant</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="index.css">
    <!-- Built-in markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- Dynamic animated backgrounds -->
    <div class="app-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="chat-container">
        <header class="chat-header">
            <div class="header-titles">
                <h1>AI Assistant</h1>
                <div class="status">
                    <span class="status-indicator bubble"></span>
                    <span class="status-text">Online</span>
                </div>
            </div>
        </header>

        <section class="chat-history" id="chat-history">
            <!-- First greeting message -->
            <div class="message ai-message">
                <div class="avatar">AI</div>
                <div class="message-content">
                    <p>Hello! I'm your intelligent assistant powered by Groq. How can I help you today?</p>
                </div>
            </div>
            <!-- Dynamic messages injected here -->
        </section>

        <footer class="chat-footer">
            <form id="chat-form">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Ask me anything..." 
                    autocomplete="off"
                    required
                />
                <button type="submit" id="send-btn" aria-label="Send">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </main>

    <!-- JS Logic -->
    <script src="script.js"></script>
</body>
</html>
